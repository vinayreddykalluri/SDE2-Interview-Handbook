name: Build Interview Handbook

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: handbook-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Validate and build all publications
        run: make build-all

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: handbook-pdfs
          path: output/pdf/
          if-no-files-found: error
          retention-days: 30

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with:
          name: handbook-combined
          path: output/combined/
          if-no-files-found: error
          retention-days: 30

      - name: Upload DOCX
        uses: actions/upload-artifact@v4
        with:
          name: handbook-docx
          path: output/docx/
          if-no-files-found: error
          retention-days: 30
