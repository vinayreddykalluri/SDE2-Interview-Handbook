name: Build Interview Handbook

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site and validate
        run: |
          make install
          make validate
          make build-site

      - name: Build handbooks
        run: make build-all

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: handbook-pdfs
          path: output/pdf/*.pdf

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v4
        with: 
          name: handbook-combined
          path: output/combined/*

      - name: Upload DOCX
        uses: actions/upload-artifact@v4
        with:
          name: handbook-docx
          path: output/docx/*.docx
